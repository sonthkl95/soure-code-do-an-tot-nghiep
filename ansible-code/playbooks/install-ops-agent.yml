---
# =============================================================
# Playbook to install Google Cloud Ops Agent on all running VMs
# Run: ansible-playbook -i inventory/hosts.ini playbooks/install-ops-agent.yml
# =============================================================

- name: Deploy Google Cloud Ops Agent to all instances
  hosts: k8s, observability, bastion
  become: true
  tasks:
    - name: Check if Google Cloud Ops Agent is already running
      command: systemctl is-active --quiet google-cloud-ops-agent
      register: ops_agent_check
      failed_when: false
      changed_when: false

    - name: Download and install Google Cloud Ops Agent
      shell: |
        curl -sSO https://dl.google.com/cloudagents/add-google-cloud-ops-agent-repo.sh
        bash add-google-cloud-ops-agent-repo.sh --also-install
      when: ops_agent_check.rc != 0

    - name: Ensure Google Cloud Ops Agent is started and enabled
      systemd:
        name: google-cloud-ops-agent
        state: started
        enabled: true

