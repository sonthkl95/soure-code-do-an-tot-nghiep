---
- name: Install Grafana GPG key
  apt_key:
    url: https://apt.grafana.com/gpg.key
    state: present

- name: Add Grafana repository
  apt_repository:
    repo: "deb https://apt.grafana.com stable main"
    state: present

- name: Install Grafana
  apt:
    name: "grafana={{ grafana_version }}*"
    state: present
    update_cache: true

# Đã loại plugin googlecloud-logging-datasource — gây lag UI trên obs-vm nhỏ.
# Xem log GCP infra trực tiếp ở GCP Cloud Console (Logging) thay vì qua Grafana.
