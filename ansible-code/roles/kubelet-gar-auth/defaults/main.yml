---
# Path tới file JSON key của SA sa-gar-puller (trên bastion / controller)
gar_key_file: "~/secrets/gar-puller-key.json"

# Registry host mà kubelet sẽ dùng credential này để pull
gar_registry_host: "asia-southeast1-docker.pkg.dev"

# Nơi kubelet sẽ đọc credential khi pull image (mặc định trên Ubuntu/Debian)
kubelet_docker_config_path: "/var/lib/kubelet/config.json"
