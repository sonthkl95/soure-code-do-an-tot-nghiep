---
- name: Install Grafana GPG key
  apt_key:
    url: https://apt.grafana.com/gpg.key
    state: present

- name: Add Grafana repository
  apt_repository:
    repo: "deb https://apt.grafana.com stable main"
    state: present

- name: Install Grafana
  apt:
    name: "grafana={{ grafana_version }}*"
    state: present
    update_cache: true

# Plugin Google Cloud Logging (tách riêng khỏi Cloud Monitoring built-in)
# → cho phép query log GCP (syslog VM, audit, VPC flow…) trực tiếp trong Grafana.
- name: Install Grafana plugin — Google Cloud Logging
  command: grafana-cli plugins install googlecloud-logging-datasource
  args:
    creates: /var/lib/grafana/plugins/googlecloud-logging-datasource
  notify: restart grafana
