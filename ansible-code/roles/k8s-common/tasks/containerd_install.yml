---
# Install containerd as container runtime
- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/debian/gpg
    state: present

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    state: present

- name: Install containerd
  apt:
    name: containerd.io
    state: present
    update_cache: true

- name: Configure containerd with SystemdCgroup
  shell: |
    mkdir -p /etc/containerd
    containerd config default > /etc/containerd/config.toml
    sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
    sed -i 's/disabled_plugins = \[ "cri" \]/disabled_plugins = \[\]/g' /etc/containerd/config.toml
  register: containerd_config

- name: Enable and start containerd
  systemd:
    name: containerd
    enabled: true
    state: started

- name: Restart containerd to apply configuration changes
  systemd:
    name: containerd
    state: restarted
  when: containerd_config.changed
