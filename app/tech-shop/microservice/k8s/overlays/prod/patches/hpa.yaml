# HPA cho BFF — chỉ enable ở prod
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bff-user
  namespace: techshop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bff-user
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bff-admin
  namespace: techshop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bff-admin
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
