---
# vars for grafana role
grafana_version: "10.4.0"
grafana_install_dir: "/opt/grafana"
grafana_port: 3000
grafana_admin_user: "admin"
grafana_admin_password: "REPLACE_WITH_SECURE_PASSWORD"

# Data Sources - auto-provisioned via IaC (no manual click needed)
grafana_datasources:
  - name: "Prometheus"
    type: "prometheus"
    url: "http://10.60.1.10:9090"
    is_default: true
  - name: "Loki"
    type: "loki"
    url: "http://10.60.1.10:3100"
  - name: "Tempo"
    type: "tempo"
    url: "http://10.60.1.10:3200"
  - name: "Google Cloud Monitoring"
    type: "stackdriver"
    url: ""
    default_project: "gcp-apse1-prj-obs-003"


# Dashboards to auto-provision (per architecture Visualization block)
grafana_dashboards:
  - name: "K8s Cluster & Node Metrics"        # Monitor CPU/RAM/Network
    gnet_id: 315                               # Kubernetes cluster monitoring dashboard
  - name: "App Performance / Nginx"            # Monitor Request Rate & 5xx Errors
    gnet_id: 9614
  - name: "Log Aggregation View"               # Real-time Log search (Loki)
    gnet_id: 13639
  - name: "Trace Waterfall"                    # Microservices function call waterfall (Tempo)
    gnet_id: 16077
  - name: "GCP GCE Virtual Machines"           # Native GCP GCE metrics via Cloud Monitoring
    gnet_id: 10940

