# Overlay DEV — apply lên K8s Dev cluster (10.10.x.x VPC)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: techshop

resources:
  - ../../base
  # Copy app-secrets.example.yaml -> app-secrets.yaml và điền giá trị.
  # File này KHÔNG commit (đã thêm trong .gitignore).
  - app-secrets.yaml

namePrefix: ""
commonAnnotations:
  techshop.io/env: dev

# Override image tag/registry — pull từ GCP Artifact Registry (project sh-access)
images:
  - name: ghcr.io/pham-van-khiem-toan-tin/discovery-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/discovery-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/identity-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/identity-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/catalog-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/catalog-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/order-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/order-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/inventory-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/inventory-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/payment-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/payment-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/search-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/search-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/bff-user
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/bff-user
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/bff-admin
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/bff-admin
    newTag: dev

# Dev: chạy 1 replica cho tất cả service (tiết kiệm tài nguyên)
replicas:
  - name: identity-service
    count: 1
  - name: catalog-service
    count: 1
  - name: order-service
    count: 1
  - name: inventory-service
    count: 1
  - name: payment-service
    count: 1
  - name: search-service
    count: 1
  - name: bff-user
    count: 1
  - name: bff-admin
    count: 1

patches:
  - path: patches/ingress-hosts.yaml
  - path: patches/bff-user-redirect.yaml
  - path: patches/bff-admin-redirect.yaml
  - target:
      kind: ConfigMap
      name: app-config
    patch: |-
      - op: replace
        path: /data/SPRING_PROFILES_ACTIVE
        value: "k8s,dev"
      - op: add
        path: /data/LOGGING_LEVEL_ROOT
        value: "INFO"
      - op: replace
        path: /data/OTEL_TRACES_EXPORTER
        value: "none"
      - op: replace
        path: /data/OTEL_METRICS_EXPORTER
        value: "none"
      - op: replace
        path: /data/OTEL_LOGS_EXPORTER
        value: "none"
      - op: add
        path: /data/OTEL_SDK_DISABLED
        value: "true"
      - op: add
        path: /data/OTEL_JAVAAGENT_ENABLED
        value: "false"
  # Dev: slow startup (Java 21 + small CPU) + RAM thiếu khi rolling
  #  -> Recreate strategy (kill old trước khi tạo new) để khỏi double pods
  #  -> Spring Security trong các service đang chặn /actuator/health/** -> 401,
  #     dẫn tới kubelet HTTP probe fail. Tạm thời dùng TCP probe (chỉ kiểm tra
  #     port mở) cho startup/readiness/liveness ở dev tới khi fix code.
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/strategy
        value:
          type: Recreate
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
      - op: add
        path: /spec/template/spec/containers/0/startupProbe
        value:
          tcpSocket:
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 60
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe
        value:
          tcpSocket:
            port: http
          periodSeconds: 10
          failureThreshold: 3
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe
        value:
          tcpSocket:
            port: http
          periodSeconds: 20
          failureThreshold: 5
