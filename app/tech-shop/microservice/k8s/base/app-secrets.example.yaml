# =============================================================
# app-secrets — Secret chứa thông tin nhạy cảm KHÔNG phải DB.
# COPY thành `app-secrets.yaml`, điền giá trị thật, KHÔNG commit.
# Hoặc dùng SealedSecret / ExternalSecret thay thế trong prod.
# =============================================================
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: techshop
type: Opaque
stringData:
  # ── Cloudinary (catalog-service) ─────────────────────────────
  CLOUDINARY_CLOUD_NAME: "REPLACE_ME"
  CLOUDINARY_API_KEY:    "REPLACE_ME"
  CLOUDINARY_API_SECRET: "REPLACE_ME"

  # ── Gmail SMTP (identity-service) ────────────────────────────
  GOOGLE_APP_PASSWORD: "REPLACE_ME"

  # ── SePay (payment-service) ──────────────────────────────────
  SEPAY_APIKEY:  "REPLACE_ME"
  BANK_NAME:     "REPLACE_ME"
  BANK_NUMBER:   "REPLACE_ME"
  SEPAY_CONTENT: "REPLACE_ME"

  # ── VNPay (payment-service) ──────────────────────────────────
  VNPAY_URL:      "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
  VNPAY_RETURN:   "REPLACE_ME"
  VNPAY_TMNCODE:  "REPLACE_ME"
  VNPAY_SECRET:   "REPLACE_ME"
  VNPAY_APIURL:   "https://sandbox.vnpayment.vn/merchant_webapi/api/transaction"

  # ── OAuth2 client secrets (BFF) ──────────────────────────────
  BFF_USER_CLIENT_ID:      "user-client"
  BFF_USER_CLIENT_SECRET:  "REPLACE_ME"
  BFF_ADMIN_CLIENT_ID:     "admin-client"
  BFF_ADMIN_CLIENT_SECRET: "REPLACE_ME"
