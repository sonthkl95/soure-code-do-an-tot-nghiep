---
- name: Deploy Node Exporter systemd service
  template:
    src: node-exporter.service.j2
    dest: /etc/systemd/system/node-exporter.service
  notify: restart node-exporter

- name: Enable and start Node Exporter
  systemd:
    name: node-exporter
    enabled: true
    state: started
    daemon_reload: true
