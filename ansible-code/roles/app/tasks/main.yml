---
# =============================================================
# Role: app — Deploy toàn bộ stack microservice TechShop lên K8s
# Hỗ trợ cả Dev và Prod (chọn qua biến `app_env` set trong playbook).
#
# Flow:
#   1. Tạo namespace `techshop`
#   2. Render + apply ConfigMap `data-endpoints` + Secret `data-credentials`
#      (data-endpoints-configmap.yaml.j2 — pull từ vault MySQL passwords)
#   3. Sync folder k8s/ (base + overlays/<env>) từ controller lên master
#      vào {{ app_k8s_remote_dir }}
#   4. Render `overlays/<env>/app-secrets.yaml` từ vault TRỰC TIẾP lên master
#      (file này .gitignore, không sync từ local)
#   5. `kubectl apply -k overlays/<env>/`
#   6. Wait rollout cho tất cả Deployment + StatefulSet
#
# Yêu cầu:
#   - Vault file: inventory/group_vars/all/vault.yml (đã encrypt) — chứa
#     vault_mysql_* + vault_cloudinary_* + vault_google_app_password +
#     vault_sepay_* + vault_vnpay_* + vault_bff_*
#   - Trên master: kubeconfig /etc/kubernetes/admin.conf (có sẵn sau kubeadm)
# =============================================================

# ─── 0. Wait dependencies (DB + Kafka + Redis + ES + Debezium) ──
# Đảm bảo data stack đã READY trước khi deploy app, tránh CrashLoopBackOff.
# Chạy wait_for TRÊN HOST CỦA PLAY (k8s_*_master) vì master ở cùng VPC
# với db-vm và có peering tới data-vm. Bastion KHÔNG có route trực tiếp.
- name: Wait for data stack endpoints ({{ app_wait_data_host }})
  wait_for:
    host: "{{ app_wait_data_host }}"
    port: "{{ item.port }}"
    timeout: "{{ app_wait_endpoint_timeout }}"
    state: started
  loop:
    - { name: "Kafka",         port: 9092 }
    - { name: "Redis",         port: 6379 }
    - { name: "Elasticsearch", port: 9200 }
    - { name: "Debezium",      port: 8083 }
  loop_control:
    label: "{{ item.name }}:{{ item.port }}"

- name: Wait for DB endpoints ({{ app_wait_db_host }} for env={{ app_env }})
  wait_for:
    host: "{{ app_wait_db_host }}"
    port: "{{ item.port }}"
    timeout: "{{ app_wait_endpoint_timeout }}"
    state: started
  loop:
    - { name: "MySQL",   port: 3306 }
    - { name: "MongoDB", port: 27017 }
  loop_control:
    label: "{{ item.name }}:{{ item.port }}"

# ─── 1. Namespace ───────────────────────────────────────────────
- name: Ensure namespace '{{ app_namespace }}' exists
  command: kubectl create namespace {{ app_namespace }} --dry-run=client -o yaml
  register: ns_yaml
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Apply namespace '{{ app_namespace }}'
  shell: echo '{{ ns_yaml.stdout }}' | kubectl apply -f -
  register: ns_apply
  changed_when: "'created' in ns_apply.stdout"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

# ─── 2. data-endpoints ConfigMap + data-credentials Secret ──────
- name: Render data-endpoints ConfigMap + data-credentials Secret
  template:
    src: data-endpoints-configmap.yaml.j2
    dest: /tmp/data-endpoints-configmap.yaml
    mode: '0600'
  no_log: true

- name: Apply data-endpoints + data-credentials
  command: kubectl apply -f /tmp/data-endpoints-configmap.yaml
  register: cm_apply
  changed_when: "'configured' in cm_apply.stdout or 'created' in cm_apply.stdout"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Cleanup rendered data manifest
  file:
    path: /tmp/data-endpoints-configmap.yaml
    state: absent

# ─── 3. Sync k8s/ folder từ controller lên master ───────────────
- name: Ensure remote k8s dir {{ app_k8s_remote_dir }} exists
  file:
    path: "{{ app_k8s_remote_dir }}"
    state: directory
    mode: '0755'

- name: Copy k8s/base/ to master
  copy:
    src: "{{ app_k8s_src_dir }}/base/"
    dest: "{{ app_k8s_remote_dir }}/base/"
    mode: preserve
    directory_mode: '0755'

- name: Copy k8s/overlays/{{ app_env }}/ to master (app-secrets sẽ overwrite ở bước sau)
  copy:
    src: "{{ app_k8s_src_dir }}/overlays/{{ app_env }}/"
    dest: "{{ app_k8s_remote_dir }}/overlays/{{ app_env }}/"
    mode: preserve
    directory_mode: '0755'

# ─── 4. Render app-secrets.yaml từ vault TRỰC TIẾP lên master ───
- name: Render app-secrets.yaml from vault to master overlay dir
  template:
    src: app-secrets.yaml.j2
    dest: "{{ app_k8s_remote_dir }}/overlays/{{ app_env }}/app-secrets.yaml"
    mode: '0600'
  no_log: true

# ─── 5. kubectl apply -k overlays/<env> ─────────────────────────
- name: Apply kustomize overlay '{{ app_env }}'
  command: >
    kubectl apply -k {{ app_k8s_remote_dir }}/overlays/{{ app_env }}/
  register: kustomize_apply
  changed_when: >
    'configured' in kustomize_apply.stdout
    or 'created' in kustomize_apply.stdout
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Show kustomize apply summary
  debug:
    var: kustomize_apply.stdout_lines

# ─── 6. Wait rollout ────────────────────────────────────────────
- name: Wait for Deployment rollouts to finish (timeout {{ app_rollout_timeout }}s each, retry {{ app_rollout_retries }}x)
  command: >
    kubectl -n {{ app_namespace }}
    rollout status deployment/{{ item }}
    --timeout={{ app_rollout_timeout }}s
  loop: "{{ app_workloads_deployments }}"
  loop_control:
    label: "deployment/{{ item }}"
  register: deploy_rollout
  retries: "{{ app_rollout_retries }}"
  delay: "{{ app_rollout_retry_delay }}"
  until: deploy_rollout.rc == 0
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Wait for StatefulSet rollouts to finish (timeout {{ app_rollout_timeout }}s each, retry {{ app_rollout_retries }}x)
  command: >
    kubectl -n {{ app_namespace }}
    rollout status statefulset/{{ item }}
    --timeout={{ app_rollout_timeout }}s
  loop: "{{ app_workloads_statefulsets }}"
  loop_control:
    label: "statefulset/{{ item }}"
  register: sts_rollout
  retries: "{{ app_rollout_retries }}"
  delay: "{{ app_rollout_retry_delay }}"
  until: sts_rollout.rc == 0
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Final pod status
  command: kubectl -n {{ app_namespace }} get pods -o wide
  register: final_pods
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Show final pod status
  debug:
    var: final_pods.stdout_lines
