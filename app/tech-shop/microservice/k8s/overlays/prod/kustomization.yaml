# Overlay PROD — apply lên K8s Prod cluster (10.20.x.x VPC)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: techshop

resources:
  - ../../base
  - app-secrets.yaml      # giá trị thật, KHÔNG commit (xem .gitignore)
  - patches/bff-user-hpa.yaml   # HPA mới (không có trong base) — add làm resource
  - patches/bff-admin-hpa.yaml

commonAnnotations:
  techshop.io/env: prod

images:
  - name: ghcr.io/pham-van-khiem-toan-tin/discovery-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/discovery-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/identity-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/identity-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/catalog-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/catalog-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/order-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/order-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/inventory-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/inventory-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/payment-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/payment-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/search-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/search-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/bff-user
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/bff-user
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/bff-admin
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/bff-admin
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/ecommerce-customer
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/ecommerce-customer
    newTag: prod
  - name: ghcr.io/pham-van-khiem-toan-tin/techshop-admin
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/techshop-admin
    newTag: prod

# Prod: scale replicas — service quan trọng = 2, còn lại = 1
replicas:
  - name: identity-service
    count: 1
  - name: catalog-service
    count: 1
  - name: order-service
    count: 1
  - name: inventory-service
    count: 1
  - name: payment-service
    count: 1
  - name: search-service
    count: 1
  - name: bff-user
    count: 1
  - name: bff-admin
    count: 1
  - name: ecommerce-customer
    count: 1
  - name: techshop-admin
    count: 1

patches:
  - path: patches/ingress-hosts.yaml
  - path: patches/bff-user-redirect.yaml
  - path: patches/bff-admin-redirect.yaml
  - target:
      kind: ConfigMap
      name: app-config
    patch: |-
      - op: replace
        path: /data/SPRING_PROFILES_ACTIVE
        value: "k8s,prod"
      - op: add
        path: /data/LOGGING_LEVEL_ROOT
        value: "WARN"
      # OTEL gateway chưa deploy trong cluster -> agent block startup vì
      # DNS timeout. Disable cho tới khi otel-gateway hoạt động.
      - op: replace
        path: /data/OTEL_TRACES_EXPORTER
        value: "none"
      - op: replace
        path: /data/OTEL_METRICS_EXPORTER
        value: "none"
      - op: replace
        path: /data/OTEL_LOGS_EXPORTER
        value: "none"
      - op: add
        path: /data/OTEL_SDK_DISABLED
        value: "true"
      - op: add
        path: /data/OTEL_JAVAAGENT_ENABLED
        value: "false"
  # Prod: imagePullPolicy: Always để rollout luôn pull image mới nhất.
  # Giữ startupProbe TCP cho Java startup chậm; readiness/liveness HTTP (từ base)
  # sẽ kick in sau khi startup pass.
  # strategy: Recreate -> kill toàn bộ pod cũ trước khi tạo pod mới
  # (replicas=1, cluster RAM hạn chế -> tránh stuck old pods chiếm memory).
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/strategy
        value:
          type: Recreate
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
      - op: add
        path: /spec/template/spec/containers/0/startupProbe
        value:
          tcpSocket:
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 60
  # StatefulSet (discovery-service) cũng cần imagePullPolicy: Always + startupProbe TCP
  #  -> tránh stale image khi rollout với tag :prod (bug đã gặp ở dev với :dev)
  #  -> startupProbe TCP đệm thời gian Eureka khởi động chậm trước khi readiness HTTP kick in
  - target:
      kind: StatefulSet
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
      - op: add
        path: /spec/template/spec/containers/0/startupProbe
        value:
          tcpSocket:
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 60
