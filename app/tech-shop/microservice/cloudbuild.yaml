# =============================================================
# Cloud Build pipeline — build & push 9 microservices lên Artifact Registry
#
# Chạy từ workspace `app/tech-shop/microservice/`:
#   cd app/tech-shop/microservice
#   gcloud config set project gcp-apse1-prj-sh-access-003
#   gcloud builds submit \
#       --config=cloudbuild.yaml \
#       --substitutions=_TAG=dev \
#       .
#
# 9 services build TUẦN TỰ (vì dùng chung Maven cache layer của Docker).
# Mỗi step ghi đè SERVICE_NAME → cache layer dependencies tái sử dụng.
# Cuối build: tag = $_TAG (mặc định `latest`) + SHORT_SHA.
# =============================================================

substitutions:
  _REGION: asia-southeast1
  _REPO: techshop
  _TAG: latest

options:
  machineType: E2_HIGHCPU_8       # Build nhanh hơn machine mặc định
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true

# Image base URL: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/<service>
images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/discovery-service:${_TAG}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/identity-service:${_TAG}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/catalog-service:${_TAG}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/order-service:${_TAG}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/inventory-service:${_TAG}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/payment-service:${_TAG}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/search-service:${_TAG}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/bff-user:${_TAG}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/bff-admin:${_TAG}"

steps:
  # ---------- discovery-service ----------
  - id: build-discovery
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=SERVICE_NAME=discovery-service
      - -t=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/discovery-service:${_TAG}
      - .

  # ---------- identity-service ----------
  - id: build-identity
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=SERVICE_NAME=identity-service
      - -t=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/identity-service:${_TAG}
      - .

  # ---------- catalog-service ----------
  - id: build-catalog
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=SERVICE_NAME=catalog-service
      - -t=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/catalog-service:${_TAG}
      - .

  # ---------- order-service ----------
  - id: build-order
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=SERVICE_NAME=order-service
      - -t=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/order-service:${_TAG}
      - .

  # ---------- inventory-service ----------
  - id: build-inventory
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=SERVICE_NAME=inventory-service
      - -t=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/inventory-service:${_TAG}
      - .

  # ---------- payment-service ----------
  - id: build-payment
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=SERVICE_NAME=payment-service
      - -t=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/payment-service:${_TAG}
      - .

  # ---------- search-service ----------
  - id: build-search
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=SERVICE_NAME=search-service
      - -t=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/search-service:${_TAG}
      - .

  # ---------- bff-user ----------
  - id: build-bff-user
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=SERVICE_NAME=bff-user
      - -t=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/bff-user:${_TAG}
      - .

  # ---------- bff-admin ----------
  - id: build-bff-admin
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=SERVICE_NAME=bff-admin
      - -t=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/bff-admin:${_TAG}
      - .

timeout: 3600s
