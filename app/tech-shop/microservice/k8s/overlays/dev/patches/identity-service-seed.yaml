# Seed OAuth2 RegisteredClient rows (bff-user, bff-admin) on identity-service startup (dev).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: techshop
spec:
  template:
    spec:
      containers:
        - name: identity-service
          env:
            - { name: APP_SEED_BFF_USER_CLIENT_ID,      value: "$(BFF_USER_CLIENT_ID)" }
            - { name: APP_SEED_BFF_USER_CLIENT_SECRET,  value: "$(BFF_USER_CLIENT_SECRET)" }
            - name: APP_SEED_BFF_USER_REDIRECT_URIS
              value: "http://shop.dev.sontx.online/login/oauth2/code/user-idp"
            - name: APP_SEED_BFF_USER_POST_LOGOUT_URIS
              value: "http://www.dev.sontx.online,http://www.dev.sontx.online/,http://dev.sontx.online,http://dev.sontx.online/"
            - { name: APP_SEED_BFF_ADMIN_CLIENT_ID,     value: "$(BFF_ADMIN_CLIENT_ID)" }
            - { name: APP_SEED_BFF_ADMIN_CLIENT_SECRET, value: "$(BFF_ADMIN_CLIENT_SECRET)" }
            - name: APP_SEED_BFF_ADMIN_REDIRECT_URIS
              value: "http://admin.dev.sontx.online/login/oauth2/code/admin-idp"
            - name: APP_SEED_BFF_ADMIN_POST_LOGOUT_URIS
              value: "http://cms.dev.sontx.online,http://cms.dev.sontx.online/"
