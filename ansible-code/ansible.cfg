[defaults]
inventory          = inventory/hosts.ini
roles_path         = roles
remote_user        = YOUR_OS_LOGIN_USER
private_key_file   = ~/.ssh/id_rsa
host_key_checking  = True
retry_files_enabled = False
stdout_callback    = yaml
gathering          = smart
fact_caching       = memory

[privilege_escalation]
become       = true
become_method = sudo
become_user  = root
