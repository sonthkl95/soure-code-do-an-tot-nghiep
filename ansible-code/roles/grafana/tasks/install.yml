---
- name: Install Grafana GPG key
  apt_key:
    url: https://apt.grafana.com/gpg.key
    state: present

- name: Add Grafana repository
  apt_repository:
    repo: "deb https://apt.grafana.com stable main"
    state: present

- name: Install Grafana
  apt:
    name: "grafana={{ grafana_version }}*"
    state: present
    update_cache: true

# Gỡ plugin googlecloud-logging-datasource nếu trước đây từng cài
# (gây lag UI trên obs-vm nhỏ — đã thay bằng GCP Cloud Console direct).
# Idempotent: `removes:` skip nếu thư mục plugin không tồn tại.
- name: Remove deprecated Grafana plugin — Google Cloud Logging
  command: grafana-cli plugins remove googlecloud-logging-datasource
  args:
    removes: /var/lib/grafana/plugins/googlecloud-logging-datasource
  notify: restart grafana

- name: Cleanup deprecated plugin directory (failsafe)
  file:
    path: /var/lib/grafana/plugins/googlecloud-logging-datasource
    state: absent
  notify: restart grafana
