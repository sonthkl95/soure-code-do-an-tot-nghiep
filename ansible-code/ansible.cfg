[defaults]
inventory          = inventory/hosts.ini
roles_path         = roles
remote_user        = admin_sontx_online
private_key_file   = ~/.ssh/gcp_sontx_key
host_key_checking  = False
retry_files_enabled = False
stdout_callback    = yaml
gathering          = smart
fact_caching       = memory
allow_world_readable_tmpfiles = True
# Tự động đọc vault password từ ~/.vault_pass (chmod 600).
# Nếu không tồn tại file, Ansible vẫn chạy nhưng sẽ hỏi password khi gặp encrypted vars.
vault_password_file = ~/.vault_pass

[privilege_escalation]
become       = true
become_method = sudo
become_user  = root
