# HPA cho prod — scale theo CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bff-user
  namespace: techshop
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: bff-user }
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: autoscaling/v2
