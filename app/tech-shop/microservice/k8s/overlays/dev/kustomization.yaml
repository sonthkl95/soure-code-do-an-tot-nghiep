# Overlay DEV — apply lên K8s Dev cluster (10.10.x.x VPC)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: techshop

resources:
  - ../../base
  # Copy app-secrets.example.yaml -> app-secrets.yaml và điền giá trị.
  # File này KHÔNG commit (đã thêm trong .gitignore).
  - app-secrets.yaml

namePrefix: ""
commonAnnotations:
  techshop.io/env: dev

# Override image tag/registry — pull từ GCP Artifact Registry (project sh-access)
images:
  - name: ghcr.io/pham-van-khiem-toan-tin/discovery-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/discovery-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/identity-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/identity-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/catalog-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/catalog-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/order-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/order-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/inventory-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/inventory-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/payment-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/payment-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/search-service
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/search-service
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/bff-user
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/bff-user
    newTag: dev
  - name: ghcr.io/pham-van-khiem-toan-tin/bff-admin
    newName: asia-southeast1-docker.pkg.dev/gcp-apse1-prj-sh-access-003/techshop/bff-admin
    newTag: dev

patches:
  - path: patches/replicas.yaml
  - path: patches/ingress-hosts.yaml
  - path: patches/bff-redirect.yaml
  - target:
      kind: ConfigMap
      name: app-config
    patch: |-
      - op: replace
        path: /data/SPRING_PROFILES_ACTIVE
        value: "k8s,dev"
      - op: add
        path: /data/LOGGING_LEVEL_ROOT
        value: "INFO"
