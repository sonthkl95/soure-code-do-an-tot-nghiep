---
# =============================================================
# gar-auth role
# Cho phép pod trong namespace `techshop` pull image từ GCP
# Artifact Registry bằng JSON key của SA `sa-gar-puller`.
#
# Yêu cầu trước khi chạy:
#   1. Tạo SA + key qua gcloud (làm 1 lần, xem README phần GAR setup):
#        gcloud iam service-accounts create sa-gar-puller ...
#        gcloud iam service-accounts keys create gar-puller-key.json ...
#   2. Copy key lên bastion: ~/secrets/gar-puller-key.json
#
# Role này chỉ chạy trên 1 master mỗi cluster (vì kubectl chỉ cần 1 lần).
# =============================================================

- name: Read GAR puller JSON key from controller (bastion)
  set_fact:
    gar_key_content: "{{ lookup('file', gar_key_file) }}"
  run_once: true
  delegate_to: localhost
  no_log: true

- name: Build dockerconfigjson (auth = base64(_json_key:<keycontent>))
  set_fact:
    gar_dockerconfigjson: >-
      {{
        {
          'auths': {
            'asia-southeast1-docker.pkg.dev': {
              'username': '_json_key',
              'password': gar_key_content,
              'email': 'admin@techshop.local',
              'auth': ('_json_key:' ~ gar_key_content) | b64encode
            }
          }
        } | to_json
      }}
  no_log: true

- name: Ensure namespace techshop exists
  command: kubectl get ns techshop
  register: ns_check
  failed_when: false
  changed_when: false

- name: Create techshop namespace if missing
  command: kubectl create namespace techshop
  when: ns_check.rc != 0

- name: Render gar-pull-secret manifest to remote
  copy:
    dest: /tmp/gar-pull-secret.yaml
    mode: '0600'
    content: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: gar-pull-secret
        namespace: techshop
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: {{ gar_dockerconfigjson | b64encode }}
  no_log: true

- name: Apply gar-pull-secret
  command: kubectl apply -f /tmp/gar-pull-secret.yaml

- name: Remove temp manifest
  file:
    path: /tmp/gar-pull-secret.yaml
    state: absent

- name: Patch default ServiceAccount to use gar-pull-secret
  command: >-
    kubectl patch serviceaccount default -n techshop
    -p {{ '{"imagePullSecrets":[{"name":"gar-pull-secret"}]}' | quote }}
