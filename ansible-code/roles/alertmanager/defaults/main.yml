---
# vars for alertmanager role (Self-hosted Alerting per architecture)
alertmanager_version: "0.27.0"
alertmanager_install_dir: "/opt/alertmanager"
alertmanager_port: 9093

# Alerting pipeline config (per architecture: Grouping, Deduplication, Routing)
alertmanager_group_wait: "30s"
alertmanager_group_interval: "5m"
alertmanager_repeat_interval: "4h"

# Notification Channels (per architecture diagram)
alertmanager_receivers:
  - name: "telegram"
    type: "telegram"
    telegram_bot_token: "REPLACE_WITH_BOT_TOKEN"
    telegram_chat_id: "REPLACE_WITH_CHAT_ID"
  - name: "slack"
    type: "slack"
    slack_webhook_url: "REPLACE_WITH_SLACK_WEBHOOK"
  - name: "email"
    type: "email"
    email_to: "REPLACE_WITH_EMAIL"
    email_smarthost: "smtp.gmail.com:587"
