---
# =============================================================
# App role - Apply ConfigMap "data-endpoints" lên K8s cluster
# ConfigMap này chứa env vars trỏ tới data-vm (10.60.1.20):
#   - SPRING_KAFKA_BOOTSTRAP_SERVERS
#   - SPRING_DATA_MONGODB_URI
#   - SPRING_DATA_REDIS_HOST / PORT
#   - SPRING_ELASTICSEARCH_URIS
#
# Các Deployment microservice (catalog, payment, order, search, ...)
# dùng envFrom.configMapRef: data-endpoints để Spring Boot tự bind
# (env var có priority cao hơn application.yml literal).
#
# Lưu ý: role này chạy trên K8s master node (group `k8s_master`).
# Source code Deployment/Helm chart sẽ được bổ sung sau.
# =============================================================

- name: Ensure namespace 'techshop' exists
  command: kubectl create namespace techshop --dry-run=client -o yaml
  register: ns_yaml
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Apply namespace 'techshop'
  shell: echo '{{ ns_yaml.stdout }}' | kubectl apply -f -
  register: ns_apply
  changed_when: "'created' in ns_apply.stdout"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Render data-endpoints ConfigMap manifest
  template:
    src: data-endpoints-configmap.yaml.j2
    dest: /tmp/data-endpoints-configmap.yaml
    mode: '0644'

- name: Apply data-endpoints ConfigMap via kubectl
  command: kubectl apply -f /tmp/data-endpoints-configmap.yaml
  register: cm_apply
  changed_when: "'configured' in cm_apply.stdout or 'created' in cm_apply.stdout"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: App role placeholder - microservice Deployments
  debug:
    msg: >
      ConfigMap 'data-endpoints' đã được apply.
      Khi viết Deployment cho microservices, dùng:
        envFrom:
          - configMapRef: { name: data-endpoints }
      → Spring Boot tự override application.yml bằng env vars.
