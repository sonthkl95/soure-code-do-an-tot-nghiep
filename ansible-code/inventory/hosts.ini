# =============================================================
# Ansible Inventory - K8s Clusters (Dev + Prod) + Observability
# 1 Master + 3 Workers per cluster (single control-plane, no HA)
# Bastion Host is the Ansible Controller (run playbooks from here)
# =============================================================

[bastion]
bastion-host ansible_host=REPLACE_WITH_BASTION_PUBLIC_IP ansible_user=YOUR_OS_LOGIN_USER ansible_connection=local

# ----- Dev K8s Cluster -----
[k8s_dev_master]
k8s-dev-master-1 ansible_host=10.10.1.10 ansible_user=YOUR_OS_LOGIN_USER

[k8s_dev_worker]
k8s-dev-worker-1 ansible_host=10.10.1.20 ansible_user=YOUR_OS_LOGIN_USER
k8s-dev-worker-2 ansible_host=10.10.1.21 ansible_user=YOUR_OS_LOGIN_USER
k8s-dev-worker-3 ansible_host=10.10.1.22 ansible_user=YOUR_OS_LOGIN_USER

# ----- Prod K8s Cluster -----
[k8s_prod_master]
k8s-prod-master-1 ansible_host=10.20.1.10 ansible_user=YOUR_OS_LOGIN_USER

[k8s_prod_worker]
k8s-prod-worker-1 ansible_host=10.20.1.20 ansible_user=YOUR_OS_LOGIN_USER
k8s-prod-worker-2 ansible_host=10.20.1.21 ansible_user=YOUR_OS_LOGIN_USER
k8s-prod-worker-3 ansible_host=10.20.1.22 ansible_user=YOUR_OS_LOGIN_USER

# ----- Group aliases for playbooks -----
[k8s_master:children]
k8s_dev_master
k8s_prod_master

[k8s_worker:children]
k8s_dev_worker
k8s_prod_worker

[k8s_dev:children]
k8s_dev_master
k8s_dev_worker

[k8s_prod:children]
k8s_prod_master
k8s_prod_worker

[k8s:children]
k8s_master
k8s_worker

# ----- Observability -----
[observability]
observability-vm ansible_host=10.60.1.10 ansible_user=YOUR_OS_LOGIN_USER

[all:vars]
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
