# ==============================================================================
# CẤU HÌNH INVENTORY ANSIBLE - QUẢN LÝ DANH SÁCH MÁY CHỦ (HOSTS & GROUPS)
# Hệ thống gồm: 2 cụm Kubernetes (Dev + Prod) và 1 Máy chủ giám sát (Observability VM)
# Máy ảo Bastion Host đóng vai trò là "Ansible Controller" (Chạy trực tiếp từ đây)
# ==============================================================================

# ─── BASTION HOST (MÁY CHỦ TRUNG GIAN) ─────────────────────────────────────────
# Định nghĩa Bastion Host. Vì chúng ta chạy Ansible trực tiếp TRÊN máy ảo này,
# tham số 'ansible_connection=local' báo cho Ansible thực thi local trực tiếp không cần SSH.
[bastion]
bastion-host ansible_host=35.187.249.83 ansible_user=admin_sontx_online ansible_connection=local

# ─── CỤM KUBERNETES DEV (PHÂN KHU DEVELOPMENT SPOKE VPC) ──────────────────────
# Master node và Worker node thuộc môi trường Dev, kết nối thông qua IP nội bộ (Private IP).
[k8s_dev_master]
k8s-dev-master-1 ansible_host=10.10.1.10 ansible_user=admin_sontx_online

[k8s_dev_worker]
k8s-dev-worker-1 ansible_host=10.10.1.20 ansible_user=admin_sontx_online

# ─── CỤM KUBERNETES PROD (PHÂN KHU PRODUCTION SPOKE VPC) ──────────────────────
# Master node và Worker node thuộc môi trường Prod, kết nối thông qua IP nội bộ (Private IP).
[k8s_prod_master]
k8s-prod-master-1 ansible_host=10.20.1.10 ansible_user=admin_sontx_online

[k8s_prod_worker]
k8s-prod-worker-1 ansible_host=10.20.1.20 ansible_user=admin_sontx_online

# ─── ĐỊNH NGHĨA GROUP CHỒNG GROUP (NESTED GROUPS - :children) ──────────────────
# Cú pháp ':children' giúp tạo ra nhóm mẹ chứa các nhóm con, giúp viết Playbook gọn gàng hơn.

# Nhóm chứa toàn bộ các máy Master của cả 2 cụm Dev và Prod
[k8s_master:children]
k8s_dev_master
k8s_prod_master

# Nhóm chứa toàn bộ các máy Worker của cả 2 cụm Dev và Prod
[k8s_worker:children]
k8s_dev_worker
k8s_prod_worker

# Nhóm chứa toàn bộ tài nguyên thuộc môi trường DEV
[k8s_dev:children]
k8s_dev_master
k8s_dev_worker

# Nhóm chứa toàn bộ tài nguyên thuộc môi trường PROD
[k8s_prod:children]
k8s_prod_master
k8s_prod_worker

# Nhóm tổng hợp toàn bộ các node Kubernetes trong cả hệ thống (Master + Worker)
[k8s:children]
k8s_master
k8s_worker

# ─── PHÂN KHU GIÁM SÁT TRUNG TÂM (OBSERVABILITY VPC) ───────────────────────────
# Máy chủ chuyên dụng chạy Prometheus, Loki, Tempo, Kafka và Grafana.
[observability]
observability-vm ansible_host=10.60.1.10 ansible_user=admin_sontx_online

# ─── CẤU HÌNH BIẾN CHUNG CHO TOÀN BỘ HỆ THỐNG MÁY CHỦ ([all:vars]) ─────────────
[all:vars]
# Đường dẫn tới tệp khóa SSH Private Key trên Bastion để SSH sang các máy con không cần mật khẩu
ansible_ssh_private_key_file=~/.ssh/gcp_sontx_key

# Chỉ định rõ đường dẫn trình thông dịch Python 3 trên các máy mục tiêu để chạy task Ansible
ansible_python_interpreter=/usr/bin/python3

