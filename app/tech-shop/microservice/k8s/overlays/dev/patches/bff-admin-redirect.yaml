# Override redirect URI cho bff-admin (dev)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-admin
  namespace: techshop
spec:
  template:
    spec:
      containers:
        - name: bff-admin
          env:
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_ADMIN_IDP_REDIRECT_URI
              value: "http://admin.dev.sontx.online/login/oauth2/code/admin-idp"
            # OIDC discovery phải đi qua public URL để authorization_endpoint
            # trong discovery doc là public (browser redirect được).
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_MY_IDENTITY_PROVIDER_ISSUER_URI
              value: "http://identity.dev.sontx.online"
            # FE admin ở cms.dev.sontx.online — BFF redirect về sau login-success,
            # post-logout và allow CORS cho calls từ FE.
            - name: APP_FRONTEND_URL
              value: "http://cms.dev.sontx.online"
            - name: APP_FRONTEND_ALLOWED_ORIGINS
              value: "http://cms.dev.sontx.online,http://admin.dev.sontx.online"
