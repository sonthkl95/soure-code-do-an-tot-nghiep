# =============================================================
# Order Service — MySQL order_db + Kafka consumer (order-group)
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: techshop
  labels: { app: order-service }
spec:
  type: ClusterIP
  selector: { app: order-service }
  ports:
    - { name: http, port: 8084, targetPort: 8084 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: techshop
  labels: { app: order-service }
spec:
  replicas: 1
  selector:
    matchLabels: { app: order-service }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  template:
    metadata:
      labels: { app: order-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8084"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: order-service
          image: ghcr.io/pham-van-khiem-toan-tin/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8084 }
          envFrom:
            - configMapRef: { name: app-config }
            - configMapRef: { name: data-endpoints }
            - secretRef:    { name: data-credentials }
          env:
            - name: OTEL_SERVICE_NAME
              value: order-service
            - { name: SPRING_DATASOURCE_URL,      value: "$(ORDER_DB_URL)" }
            - { name: SPRING_DATASOURCE_USERNAME, value: "$(ORDER_DB_USERNAME)" }
            - { name: SPRING_DATASOURCE_PASSWORD, value: "$(ORDER_DB_PASSWORD)" }
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi"   }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8084 }
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8084 }
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5
