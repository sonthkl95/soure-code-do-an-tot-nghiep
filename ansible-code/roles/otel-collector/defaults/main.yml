---
# vars for otel-collector AGENT role (chạy trên K8s nodes - per architecture)
otelcol_version: "0.99.0"
otelcol_install_dir: "/opt/otelcol"
otelcol_otlp_grpc_port: 4317
otelcol_otlp_http_port: 4318

# ETL Pipeline config (per architecture diagram)
otelcol_sampling_rate: 0.05          # Tail-based sampling: keep only 5% of traces

# Push destination - Kafka brokers (gateway trên obs-vm đọc lại)
otelcol_kafka_brokers: "10.60.1.10:9092"
otelcol_kafka_trace_topic: "trace-topic"
otelcol_kafka_log_topic: "log-topic"

# Filelog receiver - đọc K8s container logs (containerd standard path)
otelcol_log_paths:
  - /var/log/pods/*/*/*.log
