# Override Ingress hosts cho môi trường prod
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: techshop-ingress
  namespace: techshop
  annotations:
    # Cho phép FE (www / cms) gọi BFF (shop / admin) kèm cookie
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://www.sontx.online, http://sontx.online, http://cms.sontx.online"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization, X-Requested-With, X-CSRF-TOKEN"
spec:
  # Truy cập trực tiếp qua LB IP (không có Host khớp) -> trả về FE customer
  defaultBackend:
    service:
      name: ecommerce-customer
      port:
        number: 80
  rules:
    - host: shop.sontx.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bff-user
                port:
                  number: 8081
    - host: admin.sontx.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bff-admin
                port:
                  number: 8088
    - host: identity.sontx.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: 8085
    - host: www.sontx.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ecommerce-customer
                port:
                  number: 80
    - host: cms.sontx.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: techshop-admin
                port:
                  number: 80
