---
- name: Install Java (Kafka dependency)
  apt:
    name: openjdk-17-jdk-headless
    state: present
    update_cache: true

- name: Create kafka user
  user:
    name: kafka
    system: true
    shell: /bin/false
    home: "{{ kafka_install_dir }}"

- name: Create Kafka directories
  file:
    path: "{{ item }}"
    state: directory
    owner: kafka
    group: kafka
    mode: '0755'
  loop:
    - "{{ kafka_install_dir }}"
    - "{{ kafka_data_dir }}"

- name: Download Kafka
  get_url:
    url: "https://dlcdn.apache.org/kafka/{{ kafka_version }}/kafka_{{ kafka_scala_version }}-{{ kafka_version }}.tgz"
    dest: /tmp/kafka.tgz
    mode: '0644'
    timeout: 60
    force: false
  register: kafka_download
  retries: 3
  delay: 10
  until: kafka_download is succeeded

- name: Extract Kafka
  unarchive:
    src: /tmp/kafka.tgz
    dest: "{{ kafka_install_dir }}"
    remote_src: true
    extra_opts: [--strip-components=1]
    creates: "{{ kafka_install_dir }}/bin/kafka-server-start.sh"

- name: Fix ownership on Kafka install dir
  file:
    path: "{{ kafka_install_dir }}"
    owner: kafka
    group: kafka
    recurse: true
