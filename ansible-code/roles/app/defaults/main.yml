---
# =============================================================
# Defaults cho role `app`
# =============================================================

# Môi trường K8s: "dev" hoặc "prod". Set qua play vars trong playbooks/app.yml.
app_env: "dev"

# Thư mục source K8s manifests trên Ansible controller (bastion).
# playbook_dir = ansible-code/playbooks → đi lên 2 cấp ra repo root.
app_k8s_src_dir: "{{ playbook_dir }}/../../app/tech-shop/microservice/k8s"

# Thư mục đích trên K8s master node (nơi `kubectl apply -k` sẽ chạy).
app_k8s_remote_dir: "/opt/techshop-k8s"

# Namespace cố định (matches base/namespace.yaml + tất cả overlay).
app_namespace: "techshop"

# Danh sách workload cần wait rollout sau khi apply.
# StatefulSet: discovery-service. Còn lại là Deployment.
app_workloads_deployments:
  - identity-service
  - catalog-service
  - order-service
  - payment-service
  - inventory-service
  - search-service
  - bff-user
  - bff-admin
  - ecommerce-customer
  - techshop-admin

app_workloads_statefulsets:
  - discovery-service

# Timeout chờ rollout từng workload (giây).
# Fresh deploy: GAR pull ~10 image 200-500MB có thể tốn 10-15 phút ở node mới.
app_rollout_timeout: 900

# Retry rollout nếu fail (vd: pull image slow burst), 2 lần nữa, mỗi lần cách 30s.
app_rollout_retries: 3
app_rollout_retry_delay: 30

# Timeout chờ namespace + pull image sẵn sàng trước khi rollout status.
app_kubectl_apply_timeout: 120

# ─── Wait dependencies trước khi apply manifest ─────────────────
# Host data dùng chung (Kafka, Redis, Elasticsearch, Debezium).
app_wait_data_host: "10.60.1.20"

# Host DB theo môi trường (MySQL + Mongo).
# Khớp inventory: db_dev=10.10.1.30, db_prod=10.20.1.30
app_wait_db_host_map:
  dev: "10.10.1.30"
  prod: "10.20.1.30"
app_wait_db_host: "{{ app_wait_db_host_map[app_env] }}"

# Timeout (giây) chờ mỗi endpoint trước khi fail.
app_wait_endpoint_timeout: 180
