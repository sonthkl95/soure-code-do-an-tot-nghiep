---
- name: Install Redis server
  apt:
    name: redis-server
    state: present
    update_cache: true

- name: Configure Redis (bind + AOF + maxmemory)
  template:
    src: redis.conf.j2
    dest: /etc/redis/redis.conf
    owner: redis
    group: redis
    mode: '0640'
  notify: restart redis

- name: Enable and start redis-server
  systemd:
    name: redis-server
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Redis port
  wait_for:
    port: "{{ redis_port }}"
    delay: 2
    timeout: 30

# ── redis-exporter (Prometheus metrics: redis_up, memory, commands) ───────────────
- name: Download redis-exporter
  get_url:
    url: "https://github.com/oliver006/redis_exporter/releases/download/v{{ redis_exporter_version }}/redis_exporter-v{{ redis_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/redis_exporter.tar.gz
    mode: '0644'

- name: Extract redis-exporter
  unarchive:
    src: /tmp/redis_exporter.tar.gz
    dest: /usr/local/bin/
    remote_src: true
    extra_opts: [--strip-components=1]
    creates: /usr/local/bin/redis_exporter

- name: Deploy redis-exporter systemd service
  template:
    src: redis_exporter.service.j2
    dest: /etc/systemd/system/redis_exporter.service
  notify: restart redis_exporter

- name: Enable and start redis-exporter
  systemd:
    name: redis_exporter
    enabled: true
    state: started
    daemon_reload: true
