# Override Ingress hosts cho môi trường dev
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: techshop-ingress
  namespace: techshop
  annotations:
    # Cho phép FE (www.dev / cms.dev) gọi BFF (shop.dev / admin.dev) kèm cookie
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://www.dev.techshop.local, http://cms.dev.techshop.local"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization, X-Requested-With, X-CSRF-TOKEN"
spec:
  # Truy cập trực tiếp qua LB IP (không có Host khớp) -> trả về FE customer
  defaultBackend:
    service:
      name: ecommerce-customer
      port:
        number: 80
  rules:
    - host: shop.dev.techshop.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bff-user
                port:
                  number: 8081
    - host: admin.dev.techshop.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bff-admin
                port:
                  number: 8088
    - host: identity.dev.techshop.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: 8085
    - host: www.dev.techshop.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ecommerce-customer
                port:
                  number: 80
    - host: cms.dev.techshop.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: techshop-admin
                port:
                  number: 80
