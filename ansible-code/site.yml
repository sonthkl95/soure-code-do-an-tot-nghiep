---
# =============================================================
# Master Playbook - chạy TOÀN BỘ stack cả dev lẫn prod.
#
# Để chạy 1 môi trường riêng lẻ (khuyến nghị):
#   bash run-dev.sh            # chỉ dev  (--limit + env_prod_enabled=false)
#   bash run-prod.sh           # chỉ prod (--limit + env_dev_enabled=false)
#
# Chạy cả 2 (mặc định khi cả 2 env đang bật):
#   ansible-galaxy collection install -r requirements.yml
#   ansible-playbook site.yml --ask-vault-pass
#
# Cô lập env: hai biến sau kiểm soát Debezium connector + Prometheus scrape:
#   env_dev_enabled:  true/false  (default: true, xem group_vars/all/env-state.yml)
#   env_prod_enabled: true/false  (default: true)
# =============================================================

# Step 0a: Preflight — kiểm tra GAR key, vault, SSH key, kết nối host
- import_playbook: playbooks/preflight.yml

# Step 0b: Ensure baseline utilities (Vim, curl, etc.) are installed on all servers
- name: Ensure baseline packages are installed on all servers
  hosts: k8s, observability, data, db
  become: true
  tasks:
    - name: Install standard developer utilities
      apt:
        name:
          - vim
          - curl
          - htop
          - dnsutils
          - net-tools
        state: present
        update_cache: true

# Step 1: Setup K8s cluster on Dev/Prod VMs
- import_playbook: playbooks/k8s.yml

# Step 2: Deploy data stack on data-vm + db-vm (Kafka, Redis, ES, Debezium / Mongo, MySQL)
# Chạy TRƯỚC app.yml vì microservice Deployment phụ thuộc các endpoint này.
- import_playbook: playbooks/data.yml

# Step 3: Deploy core observability stack on observability-vm
- import_playbook: playbooks/observability.yml

# Step 4: Cài ingress-nginx controller trên K8s master (app dùng ingressClassName=nginx)
- import_playbook: playbooks/ingress-nginx.yml

# Step 5: Deploy app (microservices ConfigMap + Deployments) on K8s
# Role app sẽ tự wait_for DB/Kafka/Redis ready trước khi apply manifest.
- import_playbook: playbooks/app.yml

# Step 6: Deploy data collectors on K8s nodes and VMs (traces + logs + node metrics)
- import_playbook: playbooks/collectors.yml

# Step 7: Deploy K8s metrics pipeline (Prometheus Agent + kube-state-metrics)
- import_playbook: playbooks/metrics-k8s.yml

# NOTE: Google Cloud Ops Agent được cài tự động qua metadata_startup_script
# trong Terraform (compute-engine.tf, db-vm.tf, data-vm.tf) — chạy lúc VM boot.
