---
# =============================================================
# Biến endpoints cho cluster K8s DEV
# Áp dụng cho hosts trong group `k8s_dev_master` (và mặc định cho cả app role
# khi chạy trên k8s_dev_master[0]).
# =============================================================
env_name: "dev"

# MongoDB + MySQL nằm trong VPC Dev (cùng VPC với K8s Dev → latency ~0.1ms)
env_db_host: "10.10.1.30"

# Shared infra (data-vm trong VPC obs, qua peering)
shared_data_host: "10.60.1.20"

# Redis logical DB cho dev (Redis có 16 logical DB 0..15)
env_redis_database: 0

# Elasticsearch index prefix
env_es_index_prefix: "dev_"

# Kafka topic prefix (Debezium publish dev.ecommerce.*, dev.outbox.*)
env_kafka_topic_prefix: "dev."
