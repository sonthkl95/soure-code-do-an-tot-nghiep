---
# Idempotent install với version awareness:
# - Lưu version đã cài trong file marker /opt/otelcol/.version
# - So sánh với otelcol_version trong defaults → nếu khác thì re-download + extract
# - Hết cần xoá thủ công khi bump version
- name: Check installed OTel Collector version
  slurp:
    src: "{{ otelcol_install_dir }}/.version"
  register: otelcol_installed_version_raw
  failed_when: false
  changed_when: false

- name: Set installed version fact
  set_fact:
    otelcol_installed_version: "{{ (otelcol_installed_version_raw.content | b64decode | trim) if otelcol_installed_version_raw.content is defined else 'none' }}"

- name: Create OTel Collector install dir
  file:
    path: "{{ otelcol_install_dir }}"
    state: directory
    mode: '0755'

- name: Download OTel Collector binary (only if version mismatch)
  get_url:
    url: "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v{{ otelcol_version }}/otelcol-contrib_{{ otelcol_version }}_linux_amd64.tar.gz"
    dest: /tmp/otelcol-{{ otelcol_version }}.tar.gz
  when: otelcol_installed_version != otelcol_version

- name: Extract OTel Collector (force when version mismatch)
  unarchive:
    src: /tmp/otelcol-{{ otelcol_version }}.tar.gz
    dest: "{{ otelcol_install_dir }}"
    remote_src: true
  when: otelcol_installed_version != otelcol_version
  notify: restart otelcol

- name: Record installed version
  copy:
    content: "{{ otelcol_version }}"
    dest: "{{ otelcol_install_dir }}/.version"
    mode: '0644'
  when: otelcol_installed_version != otelcol_version
