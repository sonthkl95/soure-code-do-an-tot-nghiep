---
- name: Create loki user
  user:
    name: loki
    system: true
    shell: /bin/false

- name: Create Loki directories
  file:
    path: "{{ item }}"
    state: directory
    owner: loki
    group: loki
    mode: '0755'
  loop:
    - "{{ loki_install_dir }}"
    - "{{ loki_install_dir }}/data"

- name: Download Loki binary
  get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ loki_version }}/loki-linux-amd64.zip"
    dest: /tmp/loki.zip

- name: Install unzip
  apt:
    name: unzip
    state: present

- name: Extract Loki
  unarchive:
    src: /tmp/loki.zip
    dest: "{{ loki_install_dir }}"
    remote_src: true
    creates: "{{ loki_install_dir }}/loki-linux-amd64"

- name: Symlink loki binary
  file:
    src: "{{ loki_install_dir }}/loki-linux-amd64"
    dest: /usr/local/bin/loki
    state: link
