---
- name: Create Grafana provisioning directories
  file:
    path: "{{ item }}"
    state: directory
    owner: grafana
    group: grafana
    mode: '0755'
  loop:
    - /etc/grafana/provisioning/datasources
    - /etc/grafana/provisioning/dashboards
    - /var/lib/grafana/dashboards

- name: Deploy datasources provisioning config
  template:
    src: datasources.yml.j2
    dest: /etc/grafana/provisioning/datasources/datasources.yml
    owner: grafana
    group: grafana
  notify: restart grafana

- name: Deploy dashboard provider config
  template:
    src: dashboard-provider.yml.j2
    dest: /etc/grafana/provisioning/dashboards/provider.yml
    owner: grafana
    group: grafana
  notify: restart grafana

# Remove obsolete dashboards from earlier revisions (downloaded by gnet_id or renamed files)
# BEFORE copying new ones, to avoid transient duplicate-UID warnings during provisioning reload.
- name: Remove obsolete dashboards from earlier revisions
  file:
    path: "/var/lib/grafana/dashboards/{{ item }}"
    state: absent
  loop:
    - k8s-cluster.json   # legacy 315 / 13770 / 15661 download (now k8s-cluster-overview.json)
    - app-nginx.json     # legacy gnet_id 9614 (removed)
    - loki-logs.json     # legacy gnet_id 13639 (removed - logs covered in TechShop dashboard)
  notify: restart grafana

# All dashboards are custom JSON in roles/grafana/files/. See defaults/main.yml for
# the rationale (upstream Grafana.com K8s dashboards target legacy KSM v1 metric names).
# Tempo trace waterfall is available natively via Grafana Explore > Tempo (no dashboard needed).
- name: Deploy Grafana dashboards (custom JSON)
  copy:
    src: "{{ item }}"
    dest: "/var/lib/grafana/dashboards/{{ item }}"
    owner: grafana
    group: grafana
    mode: '0644'
  loop: "{{ grafana_dashboard_files }}"
  notify: restart grafana

