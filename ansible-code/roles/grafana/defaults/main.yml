---
# vars for grafana role
grafana_version: "11.4.0"
grafana_install_dir: "/opt/grafana"
grafana_port: 3000
grafana_admin_user: "admin"
grafana_admin_password: "REPLACE_WITH_SECURE_PASSWORD"

# Data Sources - auto-provisioned via IaC (no manual click needed)
# Note: explicit `uid` values let dashboards reference datasources by stable UID across re-provisioning.
grafana_datasources:
  - name: "Prometheus"
    type: "prometheus"
    uid: "prometheus"
    url: "http://10.60.1.10:9090"
    is_default: true
  - name: "Loki"
    type: "loki"
    uid: "loki"
    url: "http://10.60.1.10:3100"
  - name: "Tempo"
    type: "tempo"
    uid: "tempo"
    url: "http://10.60.1.10:3200"
  - name: "Google Cloud Monitoring"
    type: "stackdriver"
    uid: "google-cloud-monitoring"
    url: ""
    default_project: "gcp-apse1-prj-dev-env-003"
  # NOTE: Google Cloud Logging plugin đã bị xóa vì gây lag UI Grafana trên obs-vm
  # (plugin Go sidecar tốn RAM + gọi list-projects API mỗi page load).
  # Để xem log GCP infra (syslog VM, audit, VPC flow), dùng trực tiếp:
  #   https://console.cloud.google.com/logs/query?project=<project-id>
  # Log app K8s vẫn xem qua Loki như bình thường.


# Dashboards auto-provisioned via roles/grafana/files/*.json (see tasks/provisioning.yml).
# All dashboards are custom (Prometheus / Loki / Stackdriver) because upstream Grafana.com
# K8s dashboards (315/13770/15661/6417/12740/13332) reference legacy KSM v1 metric names
# (kube_*_cpu_cores, kube_*_pods, kubernetes_io_hostname, id="/", ...) that do not exist in
# our stack (KSM v2 + node-exporter modern + containerd + cgroup v2).
grafana_dashboard_files:
  - k8s-cluster-overview.json     # Kubernetes Cluster Overview (KSM v2 + node-exporter + cadvisor)
  - gcp-cloud-monitoring.json     # GCP GCE VMs (Stackdriver)
  - techshop-microservices.json   # TechShop App (Spring Boot Actuator + HikariCP + Loki)

