# Override redirect URI cho bff-user (prod)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-user
  namespace: techshop
spec:
  template:
    spec:
      containers:
        - name: bff-user
          env:
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_USER_IDP_REDIRECT_URI
              value: "http://shop.sontx.online/login/oauth2/code/user-idp"
            # OIDC discovery phải đi qua public URL để authorization_endpoint
            # trong discovery doc là public (browser redirect được).
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_MY_IDENTITY_PROVIDER_ISSUER_URI
              value: "http://identity.sontx.online"
            # FE customer ở www/sontx.online — BFF redirect về sau login-success,
            # post-logout và allow CORS cho calls từ FE.
            - name: APP_FRONTEND_URL
              value: "http://www.sontx.online"
            - name: APP_FRONTEND_ALLOWED_ORIGINS
              value: "http://www.sontx.online,http://sontx.online,http://shop.sontx.online"
