---
# kafka-exporter: Prometheus metrics cho Kafka
# Cung cấp: kafka_brokers, kafka_topic_partition_current_offset,
#           kafka_consumer_group_lag (dùng trong alert APP-04)
- name: Download kafka-exporter
  get_url:
    url: "https://github.com/danielqsj/kafka_exporter/releases/download/v{{ kafka_exporter_version }}/kafka_exporter-{{ kafka_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/kafka_exporter.tar.gz
    mode: '0644'

- name: Extract kafka-exporter
  unarchive:
    src: /tmp/kafka_exporter.tar.gz
    dest: /usr/local/bin/
    remote_src: true
    extra_opts: [--strip-components=1]
    creates: /usr/local/bin/kafka_exporter

- name: Deploy kafka-exporter systemd service
  template:
    src: kafka_exporter.service.j2
    dest: /etc/systemd/system/kafka_exporter.service
  notify: restart kafka_exporter

- name: Enable and start kafka-exporter
  systemd:
    name: kafka_exporter
    enabled: true
    state: started
    daemon_reload: true
