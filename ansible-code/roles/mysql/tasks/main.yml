---
- name: Install MariaDB server + Python client (cho ansible mysql_* modules)
  apt:
    name:
      - mariadb-server
      - python3-pymysql
    state: present
    update_cache: true

- name: Disable bind-address trong Debian default config (tránh override 60-data-vm.cnf)
  replace:
    path: /etc/mysql/mariadb.conf.d/50-server.cnf
    regexp: '^(\s*bind-address\s*=.*)$'
    replace: '# \1   # disabled by ansible: see 60-data-vm.cnf'
  notify: restart mariadb

- name: Deploy MariaDB custom config (bind 0.0.0.0 + tuning)
  template:
    src: 60-data-vm.cnf.j2
    dest: /etc/mysql/mariadb.conf.d/60-data-vm.cnf
    owner: root
    group: root
    mode: '0644'
  notify: restart mariadb

- name: Enable and start MariaDB
  systemd:
    name: mariadb
    enabled: true
    state: started
    daemon_reload: true

- name: Flush handlers ngay để restart MariaDB trước khi tạo db/user (đảm bảo bind 0.0.0.0)
  meta: flush_handlers

- name: Wait for MariaDB port
  wait_for:
    port: "{{ mysql_port }}"
    delay: 3
    timeout: 60

- name: Create application databases
  community.mysql.mysql_db:
    name: "{{ item.name }}"
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock
  loop: "{{ mysql_databases }}"
  loop_control:
    label: "{{ item.name }}"

- name: Create application users + grants
  community.mysql.mysql_user:
    name: "{{ item.user }}"
    password: "{{ item.password }}"
    host: "%"
    priv: "{{ item.name }}.*:ALL"
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock
  loop: "{{ mysql_databases }}"
  loop_control:
    label: "{{ item.user }}"
  no_log: true

# ── mysqld-exporter (Prometheus metrics: mysql_up, connections, queries) ──────
- name: Create mysqld-exporter user in MariaDB
  community.mysql.mysql_user:
    name: "{{ mysql_exporter_user }}"
    password: "{{ mysql_exporter_password }}"
    host: "localhost"
    priv: "*.*:PROCESS,REPLICATION CLIENT,SELECT"
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock
  no_log: true

- name: Download mysqld-exporter
  get_url:
    url: "https://github.com/prometheus/mysqld_exporter/releases/download/v{{ mysql_exporter_version }}/mysqld_exporter-{{ mysql_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/mysqld_exporter.tar.gz
    mode: '0644'

- name: Extract mysqld-exporter
  unarchive:
    src: /tmp/mysqld_exporter.tar.gz
    dest: /usr/local/bin/
    remote_src: true
    extra_opts: [--strip-components=1]
    creates: /usr/local/bin/mysqld_exporter

- name: Deploy mysqld-exporter credentials file
  template:
    src: mysqld_exporter.cnf.j2
    dest: /etc/mysqld_exporter.cnf
    owner: root
    group: root
    mode: '0600'

- name: Deploy mysqld-exporter systemd service
  template:
    src: mysqld_exporter.service.j2
    dest: /etc/systemd/system/mysqld_exporter.service
  notify: restart mysqld_exporter

- name: Enable and start mysqld-exporter
  systemd:
    name: mysqld_exporter
    enabled: true
    state: started
    daemon_reload: true
