# =============================================================
# Discovery Service — Eureka registry (Spring Cloud Netflix)
# StatefulSet 1 replica + Headless Service ⇒ DNS ổn định.
# Các service khác kết nối qua EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
# (định nghĩa trong ConfigMap app-config).
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: discovery-service
  namespace: techshop
  labels: { app: discovery-service }
spec:
  type: ClusterIP
  clusterIP: None        # headless ⇒ DNS A record trỏ thẳng pod
  selector: { app: discovery-service }
  ports:
    - name: http
      port: 8761
      targetPort: 8761
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: discovery-service
  namespace: techshop
  labels: { app: discovery-service }
spec:
  serviceName: discovery-service
  replicas: 1
  selector:
    matchLabels: { app: discovery-service }
  template:
    metadata:
      labels: { app: discovery-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8761"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: discovery-service
          image: ghcr.io/pham-van-khiem-toan-tin/discovery-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8761 }
          env:
            - name: SPRING_APPLICATION_NAME
              value: discovery-server
            - name: SERVER_PORT
              value: "8761"
            # Discovery KHÔNG register vào chính nó
            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: "false"
            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "false"
            - name: OTEL_SERVICE_NAME
              value: discovery-service
          envFrom:
            - configMapRef: { name: app-config }
          resources:
            requests: { cpu: "100m", memory: "384Mi" }
            limits:   { cpu: "500m", memory: "640Mi" }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8761 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8761 }
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
